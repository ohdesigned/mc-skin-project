<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2A2138" />
    <meta name="description" content="Pixel Skin Studio - create and edit Minecraft Java Edition skins in your browser." />
    <title>Pixel Skin Studio - MC Skin Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      #boot-fallback {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #2A2138 0%, #1B1424 70%, #0c0712 100%);
        color: #F7E6CF;
        font-family: 'VT323', monospace;
        font-size: 22px;
        letter-spacing: 0.04em;
      }
      #root {
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="boot-fallback">Loading Pixel Skin Studio...</div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var boot = document.getElementById('boot-fallback');
        var root = document.getElementById('root');
        function hideBoot() {
          if (boot) boot.style.display = 'none';
        }
        if (root) {
          new MutationObserver(function () {
            if (root.childElementCount > 0) hideBoot();
          }).observe(root, { childList: true, subtree: true });
        }
        window.addEventListener('pss-ready', hideBoot);
        setTimeout(function () {
          if (boot && boot.style.display !== 'none') {
            boot.textContent = 'Still loading... try refreshing the page.';
          }
        }, 6000);
      })();
    </script>
    <noscript>
      <p style="font-family: sans-serif; padding: 24px; text-align: center;">
        Pixel Skin Studio requires JavaScript. Please enable it and reload.
      </p>
    </noscript>
  </body>
</html>
