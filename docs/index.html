<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2A2138" />
    <meta name="description" content="Pixel Skin Studio - create and edit Minecraft Java Edition skins in your browser." />
    <title>Pixel Skin Studio - MC Skin Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <style>
      html, body { margin: 0; height: 100%; background: #1B1424; color: #F7E6CF; }
      body {
        font-family: 'VT323', monospace;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #boot {
        text-align: center;
        padding: 24px;
        font-size: 24px;
        background: radial-gradient(ellipse at center, #2A2138 0%, #1B1424 70%, #0c0712 100%);
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DmyE8A9l.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BVDIj8io.css">
  </head>
  <body>
    <div id="boot">Loading Pixel Skin Studio...</div>
    <div id="root"></div>
    <script>
      window.addEventListener(
        'error',
        function (e) {
          var t = e.target
          if (!t || t.tagName !== 'SCRIPT') return
          var boot = document.getElementById('boot')
          if (!boot || boot.dataset.failed) return
          boot.dataset.failed = '1'
          boot.innerHTML =
            '<div style="max-width:480px;padding:24px;text-align:center;">' +
            '<div style="font-size:28px;margin-bottom:12px;">Could not load</div>' +
            '<div style="margin-bottom:18px;font-size:20px;">The app bundle failed to load. Refresh the page.</div>' +
            '<button onclick="location.reload()" style="font-family:VT323,monospace;font-size:20px;padding:8px 16px;background:#3FB6A8;color:#1B1424;border:3px solid #2A2138;cursor:pointer;">Reload</button></div>'
        },
        true,
      )
    </script>
    <noscript>
      <p style="font-family: sans-serif; padding: 24px; text-align: center;">
        This app requires JavaScript. Please enable it and reload.
      </p>
    </noscript>
  </body>
</html>
